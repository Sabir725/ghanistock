<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Stock Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4; }
        .login-container { text-align: center; padding: 40px; background-color: #fff; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 30px; }
        .login-btn { display: inline-block; background-color: #3498db; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-size: 18px; font-weight: bold; transition: background-color 0.3s; }
        .login-btn:hover { background-color: #2980b9; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Intraday Stock Dashboard</h1>
        <p>Please log in with your Fyers account to continue.</p>
        <a href="/login" class="login-btn">Login with Fyers</a>
    </div>
</body>
</html>
